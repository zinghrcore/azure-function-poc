name: Deploy Attendance Function

on:
  push:
    branches:
      - main
    paths:
      - 'attendance-api-integration-function/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd attendance-api-integration-function
          pip install -r requirements.txt

      - name: Deploy
        uses: Azure/functions-action@v1
        with:
          app-name: func-fc1-attendance-poc-ci
          package: attendance-api-integration-function
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_ATTENDANCE_PUBLISH_PROFILE }}